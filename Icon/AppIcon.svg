<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: refined deep "library" gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33433A"/>
      <stop offset="0.55" stop-color="#212C26"/>
      <stop offset="1" stop-color="#141B17"/>
    </linearGradient>
    <!-- Soft glassy highlight near the top -->
    <radialGradient id="glow" cx="512" cy="300" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Page fills: cream, darker toward the spine fold -->
    <linearGradient id="rightPage" x1="512" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7DBC1"/>
      <stop offset="0.18" stop-color="#F1E8D4"/>
      <stop offset="1" stop-color="#FAF3E3"/>
    </linearGradient>
    <linearGradient id="leftPage" x1="512" y1="0" x2="224" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7DBC1"/>
      <stop offset="0.18" stop-color="#F1E8D4"/>
      <stop offset="1" stop-color="#FAF3E3"/>
    </linearGradient>
    <!-- Bookmark ribbon gold -->
    <linearGradient id="ribbon" x1="0" y1="360" x2="0" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6CE7C"/>
      <stop offset="0.5" stop-color="#E4A948"/>
      <stop offset="1" stop-color="#C6862C"/>
    </linearGradient>
    <linearGradient id="gutter" x1="496" y1="0" x2="528" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A6A4A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5A4A2E" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7A6A4A" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Drop shadow under the book (tight, grounded) -->
  <ellipse cx="512" cy="700" rx="298" ry="40" fill="#000000" opacity="0.32" filter="url(#softShadow)"/>

  <!-- Book, scaled up and nudged toward optical center -->
  <g transform="translate(512 502) scale(1.15) translate(-512 -512)">
    <!-- Page thickness (under the bottom edges) -->
    <path d="M512,636 C600,628 700,614 788,600 L788,618 C700,632 600,646 512,654 Z" fill="#D7C9A9"/>
    <path d="M512,636 C424,628 324,614 236,600 L236,618 C324,632 424,646 512,654 Z" fill="#CFC0A0"/>

    <!-- Right page -->
    <path d="M512,392 C600,372 700,360 788,360 C800,440 800,520 788,600 C700,614 600,628 512,636 Z" fill="url(#rightPage)"/>
    <!-- Left page -->
    <path d="M512,392 C424,372 324,360 236,360 C224,440 224,520 236,600 C324,614 424,628 512,636 Z" fill="url(#leftPage)"/>

    <!-- Page top sheen -->
    <path d="M512,392 C600,372 700,360 788,360" stroke="#FFFFFF" stroke-width="2.5" opacity="0.55" fill="none"/>
    <path d="M512,392 C424,372 324,360 236,360" stroke="#FFFFFF" stroke-width="2.5" opacity="0.55" fill="none"/>

    <!-- Gutter / spine shadow -->
    <path d="M512,392 L512,636" stroke="url(#gutter)" stroke-width="30" fill="none"/>
    <path d="M512,394 L512,634" stroke="#4A3C24" stroke-width="3" opacity="0.5" fill="none"/>

    <!-- Bookmark ribbon -->
    <path d="M488,372 L536,372 L536,726 L512,700 L488,726 Z" fill="url(#ribbon)"/>
    <path d="M488,372 L500,372 L500,712 L494,718 L488,726 Z" fill="#FCE3AC" opacity="0.45"/>
    <path d="M528,372 L536,372 L536,726 L530,716 L528,706 Z" fill="#9A6620" opacity="0.45"/>
  </g>
</svg>
